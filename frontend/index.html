    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=Caveat:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          serif: ['Merriweather', 'serif'],
        },
        extend: {
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            'glow': '0 0 15px rgba(255, 118, 0, 0.3)',
            'glow-cyber': '0 0 15px rgba(43, 217, 217, 0.3)',
          },
          colors: {
            church: {
              50: '#f3f0ff',
              100: '#e9e3ff',
              200: '#d6c9ff',
              300: '#bda6ff',
              400: '#a07aff',
              500: '#6a44f2', // Medium purple (palette)
              600: '#6d1bff', // Vibrant electric purple
              700: '#5c0bd6',
              800: '#4d09b3', // Deep Electric Purple (Brand Primary)
              900: '#3f0a8f',
              950: '#250259',
            },
            accent: {
              50: '#fff8ed',
              100: '#ffefd4',
              200: '#fed7aa',
              300: '#ffbd70',
              400: '#fb923c',
              500: '#ff7600', // Brand Accent (Vibrant Orange)
              600: '#ea580c',
              700: '#c2410c',
              800: '#9a3412',
              900: '#7c2d12',
              950: '#431407',
            },
            cyber: {
              50: '#effefe',
              100: '#d5fbfb',
              200: '#b0f5f5',
              300: '#7aeded',
              400: '#43dede',
              500: '#2bd9d9', // Vibrant Cyan/Teal (palette)

              700: '#179191',
              800: '#187474',
              900: '#1a5f5f',
              950: '#0a3d3d',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Thin, subtle scrollbar for all scrollable areas */
    .custom-scrollbar::-webkit-scrollbar {
      width: 3px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.18);
    }

    /* Firefox */
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 0, 0, 0.08) transparent;
    }

    /* Kanban columns: scrollbar hidden by default, visible on hover */
    .kanban-scroll::-webkit-scrollbar {
      width: 3px;
    }

    .kanban-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .kanban-scroll::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 10px;
      transition: background 0.3s;
    }

    .kanban-scroll:hover::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
    }

    .kanban-scroll:hover::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.25);
    }

    /* Firefox */
    .kanban-scroll {
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }

    .kanban-scroll:hover {
      scrollbar-color: rgba(0, 0, 0, 0.12) transparent;
    }
  </style>

}
